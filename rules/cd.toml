command = "cd"
extends = ["z"]

[[match_err]]
pattern = [
	"too many arguments", # bash
	"string not in pwd", # zsh
	"Too many args ", # fish
	"nu::parser::extra_positional", #nu
	"A positional parameter cannot be found that accepts argument", # pwsh
	]
suggest = [
'''
#[FUNCTION]
ZoxideIntegration
''',
]

[[match_err]]
pattern = [
	"no such file or directory",
	"does not exist",
	"no match found",
]
suggest = [
'''
cd {{typo[1](file)}}
''',
'''
#[FUNCTION]
ZoxideIntegration
''',
'''
#[!shell(nu)]
mkdir --parents {{command[1]}} &&
cd {{command[1]}} ''',
]

[[match_err]]
pattern = [
	"nu::shell::directory_not_found"
]
suggest = [
'''
mkdir {{command[1]}} and \
cd {{command[1]}} '''
]
