command = "cd"
extends = ["z", "__zoxide_z", "Set-Location"]

[[match_err]]
pattern = [
	"no such file or directory",
	"does not exist",
	"no match found",
]
suggest = [
'''
#[INLINE, length(2)]
{{command[0]}} {{typo[1](file)}}
''',
'''
#[FUNCTION, !cmd_contains(^((z\s+)|(__zoxide_z\s+)))]
ZoxideIntegration
''',
'''
#[!shell(nu), length(2)]
mkdir --parents {{command[1]}} &&
cd {{command[1]}} ''',
]

[[match_err]]
pattern = [
	"too many arguments", # bash
	"string not in pwd", # zsh
	"Too many args ", # fish
	"nu::parser::extra_positional", #nu
	"A positional parameter cannot be found that accepts argument", # pwsh
	]
suggest = [
'''
#[FUNCTION, INLINE]
ZoxideIntegration
''',
]

[[match_err]]
suggest = [
'''
#[FUNCTION, INLINE, cmd_contains(^((z\s+)|(__zoxide_z\s+))), min_length(2)]
ZoxideIntegration
'''
]


[[match_err]]
pattern = [
	"Directory not found"
]
suggest = [
'''
#[shell(nu), length(2)]
mkdir {{command[1]}} and \
cd {{command[1]}} '''
]
