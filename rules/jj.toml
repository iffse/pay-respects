command = "jj"

[[match_err]]
pattern = [
	"error: commit",
	"is immutable`",
	"pass `--ignore-immutable`", # deprecated
]
suggest = [
'''
{{command}} --ignore-immutable
''',
]

[[match_err]]
pattern = [
	"no bookmarks found in the default push revset",
]
suggest = [
'''
{{command}} --change @
''',
]

[[match_err]]
pattern = [
	"hint: run",
	"and try again",
]
suggest = [
'''
{{err::Hint: Run `(.*)` and try again.}} &&
{{command}}
''',
'''
{{err::Hint: Run `(.*)` and try again.}}
''',
]

# deprecated
[[match_err]]
pattern = [
	"use --allow-new to push new bookmark"
]
suggest = [
'''
{{command}} --allow-new'''
]
